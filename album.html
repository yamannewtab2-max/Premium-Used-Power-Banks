<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album — Premium Used Power Banks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Playfair+Display:ital,wght@0,600..900;1,600..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-album{min-height:100vh;padding:7rem 1.5rem 2rem;background:var(--bg)}
    .album-header{text-align:center;margin-bottom:2.5rem}
    .album-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;font-style:italic;color:var(--gold-light)}
    .album-header p{color:var(--text-muted);font-size:0.9rem;margin-top:0.3rem}
    .album-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;max-width:960px;margin:0 auto}
    .album-card{border-radius:20px;overflow:hidden;border:1px solid var(--border);background:var(--bg-card);transition:transform 0.35s,box-shadow 0.35s}
    .album-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,0.4)}
    .album-card img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover}
    .album-card__label{display:block;padding:0.5rem 1rem;font-size:0.85rem;font-weight:600;color:var(--gold-light);background:var(--bg);text-align:center;border-top:1px solid var(--border)}
    .back-link{display:inline-flex;align-items:center;gap:0.4rem;color:var(--gold-light);text-decoration:none;font-size:0.9rem;font-weight:500;margin-bottom:1.5rem;transition:gap 0.3s}
    .back-link:hover{gap:0.7rem}
    @media(max-width:640px){.page-album{padding:5rem 0.75rem 1.5rem}}
  </style>
</head>
<body>
  <div class="page-album">
    <div style="max-width:960px;margin:0 auto">
      <a href="index.html" class="back-link">← Back to Home</a>
      <div class="album-header">
        <h1>Product Album</h1>
        <p>Premium Used Power Banks — Real Stock Photos</p>
      </div>
      <div style="text-align:center;margin-bottom:2rem">
        <a href="https://wa.me/8618026937104" target="_blank" class="btn btn--whatsapp" style="display:inline-flex;max-width:340px;padding:0.7rem 1.5rem;font-size:0.85rem">📲 Contact Us on WhatsApp</a>
      </div>
      <div class="album-grid">
        <div class="album-card">
          <img src="album-photo-1.jpg" alt="" loading="lazy" />
          <span class="album-card__label">1-</span>
        </div>
        <div class="album-card">
          <img src="album-photo-2.jpg" alt="" loading="lazy" />
          <span class="album-card__label">2-</span>
        </div>
        <div class="album-card">
          <img src="album-photo-3.jpg" alt="" loading="lazy" />
          <span class="album-card__label">3-</span>
        </div>
        <div class="album-card">
          <img src="album-photo-4.jpg" alt="" loading="lazy" />
          <span class="album-card__label">4-</span>
        </div>
        <div class="album-card">
          <img src="album-photo-5.jpg" alt="" loading="lazy" />
          <span class="album-card__label">5-</span>
        </div>
        <div class="album-card">
          <img src="album-photo-9.jpg" alt="" loading="lazy" />
          <span class="album-card__label">9-</span>
        </div>
        <div class="album-card">
          <img src="album-photo-10.jpg" alt="" loading="lazy" />
          <span class="album-card__label">10-</span>
        </div>
        <div class="album-card">
          <img src="album-photo-11.jpg" alt="" loading="lazy" />
          <span class="album-card__label">11-</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
