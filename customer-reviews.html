<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Reviews — Shenzhen Luosheng Digital Technology Firm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Playfair+Display:ital,wght@0,600..900;1,600..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-reviews{min-height:100vh;padding:7rem 1.5rem 2rem;background:var(--bg)}
    .reviews-header{text-align:center;margin-bottom:2.5rem}
    .reviews-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;font-style:italic;color:var(--gold-light)}
    .reviews-header p{color:var(--text-muted);font-size:0.9rem;margin-top:0.3rem}
    .back-link{display:inline-flex;align-items:center;gap:0.4rem;color:var(--gold-light);text-decoration:none;font-size:0.9rem;font-weight:500;margin-bottom:1.5rem;transition:gap 0.3s}
    .back-link:hover{gap:0.7rem}
    .review-section-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;font-style:italic;color:var(--gold-light);margin:0 auto 1.2rem;max-width:640px;text-align:center}
    .review-video-grid{display:flex;gap:1rem;margin:0 auto 2.5rem;max-width:960px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
    .review-video-card{flex:1 1 300px;max-width:470px;border-radius:20px;overflow:hidden;border:1px solid var(--border);background:#000}
    .review-video-card video{display:block;max-width:100%;height:auto}
    .review-video-card__label{display:block;padding:0.5rem 1rem;font-size:0.82rem;font-weight:600;color:var(--gold-light);background:var(--bg);text-align:center;border-top:1px solid var(--border)}
    .review-img-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;max-width:960px;margin:0 auto 2.5rem}
    .review-img-card{border-radius:16px;overflow:hidden;border:1px solid var(--border);background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:180px}
    .review-img-card img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover}
    @media(max-width:640px){.page-reviews{padding:5rem 0.75rem 1.5rem}}
  </style>
</head>
<body>
  <div class="page-reviews">
    <div style="max-width:960px;margin:0 auto">
      <a href="/" class="back-link">← Back to Home</a>
      <div class="reviews-header">
        <h1>Customer Reviews</h1>
        <p>Real feedback from our happy customers worldwide</p>
      </div>
      <div style="text-align:center;margin-bottom:2rem">
        <a href="https://wa.me/8618026937104?text=Hi%20there%2C%20I%20saw%20your%20customer%20reviews%20and%20I%27m%20interested%20in%20your%20power%20banks%20wholesale" target="_blank" class="btn btn--whatsapp" style="display:inline-flex;max-width:340px;padding:0.7rem 1.5rem;font-size:0.85rem">📲 Contact Us on WhatsApp</a>
      </div>

      <h2 class="review-section-title">Video reviews:</h2>
      <div class="review-video-grid">
        <div class="review-video-card">
          <video src="review-video-1.mp4" poster="review-video-1-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Customer review 1-</span>
        </div>
        <div class="review-video-card">
          <video src="review-video-2.mp4" poster="review-video-2-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Customer review 2-</span>
        </div>
        <div class="review-video-card">
          <video src="review-video-3.mp4" poster="review-video-3-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Customer review 3-</span>
        </div>
        <div class="review-video-card">
          <video src="review-video-4.mp4" poster="review-video-4-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Customer review 4-</span>
        </div>
        <div class="review-video-card">
          <video src="review-video-5.mp4" poster="review-video-5-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Customer review 5-</span>
        </div>
      </div>

      <h2 class="review-section-title">Customer photos:</h2>
      <div class="review-img-grid">
        <div class="review-img-card"><img src="review-img-1.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-2.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-3.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-4.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-5.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-6.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-7.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-8.jpg?v=1" alt="" loading="lazy" /></div>
        <div class="review-img-card"><img src="review-img-9.jpg?v=1" alt="" loading="lazy" /></div>
      </div>
    </div>
  </div>
</body>
</html>
