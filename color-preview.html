<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Preview — Hero Title</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Playfair+Display:ital,wght@0,600..900;1,600..900&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:#06080e;color:#eaeef5;padding:2rem}
    h1{text-align:center;font-size:2rem;margin-bottom:2rem;color:var(--gold,#f0c27f)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem;max-width:1400px;margin:0 auto}
    .card{
      background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;overflow:hidden;
      backdrop-filter:blur(8px);
      transition:transform 0.3s;
    }
    .card:hover{transform:translateY(-4px)}
    .card__preview{
      position:relative;width:100%;height:200px;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .card__preview img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
      filter:brightness(0.45);
    }
    .card__text{
      position:relative;z-index:2;text-align:center;padding:1rem;
    }
    .card__preview h2{
      font-family:'Outfit',sans-serif;
      font-size:1.3rem;font-weight:900;
      line-height:1.15;letter-spacing:-0.02em;
      position:relative;z-index:2;
      text-shadow:
        0 0 20px rgba(0,0,0,0.9),
        0 0 60px rgba(0,0,0,0.6),
        0 4px 30px rgba(0,0,0,0.8);
      -webkit-text-stroke:1.5px rgba(0,0,0,0.3);
    }
    .card__info{padding:1rem;text-align:center}
    .card__info .name{font-size:1rem;font-weight:700;color:var(--gold,#f0c27f);margin-bottom:0.3rem}
    .card__info .hex{font-size:0.8rem;color:#7f8a9e;font-family:monospace}
    .tag{display:inline-block;margin-top:0.4rem;padding:0.15rem 0.5rem;border-radius:6px;font-size:0.7rem;font-weight:600;background:rgba(255,255,255,0.06);color:var(--gold-light)}
  </style>
</head>
<body>
  <h1>🎨 10 Hero Title Colors</h1>
  <div class="grid" id="grid"></div>
  <script>
    const colors = [
      { name: "Classic White", color: "#ffffff", note: "Original" },
      { name: "Warm Ivory", color: "#f5f0e8", note: "Soft warm white" },
      { name: "Soft Gold", color: "#f5d6a8", note: "Light gold" },
      { name: "Gold", color: "#f0c27f", note: "Brand gold" },
      { name: "Deep Gold", color: "#d4a04a", note: "Rich amber" },
      { name: "Champagne", color: "#e8d5b0", note: "Elegant bubbly" },
      { name: "Bright Amber", color: "#ffb347", note: "Warm orange-gold" },
      { name: "Cream", color: "#fff5d6", note: "Soft yellow-white" },
      { name: "Honey", color: "#daa520", note: "Golden honey" },
      { name: "Platinum", color: "#e8e8f0", note: "Cool silvery" }
    ];

    const grid = document.getElementById('grid');
    
    colors.forEach(c => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card__preview">
          <img src="bg-hero.jpg" alt="" loading="lazy" />
          <h2 style="color:${c.color}">Shenzhen Luosheng<br/>Digital Technology Firm</h2>
        </div>
        <div class="card__info">
          <div class="name" style="color:${c.color}">${c.name}</div>
          <div class="hex">${c.color}</div>
          <span class="tag">${c.note}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
