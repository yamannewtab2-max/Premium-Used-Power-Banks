<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packing Process — Shenzhen Luosheng Digital Technology Firm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Playfair+Display:ital,wght@0,600..900;1,600..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-reviews{min-height:100vh;padding:7rem 1.5rem 2rem;background:var(--bg)}
    .reviews-header{text-align:center;margin-bottom:2.5rem}
    .reviews-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;font-style:italic;color:var(--gold-light)}
    .reviews-header p{color:var(--text-muted);font-size:0.9rem;margin-top:0.3rem}
    .back-link{display:inline-flex;align-items:center;gap:0.4rem;color:var(--gold-light);text-decoration:none;font-size:0.9rem;font-weight:500;margin-bottom:1.5rem;transition:gap 0.3s}
    .back-link:hover{gap:0.7rem}
    .review-label{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;font-style:italic;color:var(--gold-light);margin:0 auto 1.5rem;max-width:640px;text-align:center}

    /* ─── Carousel ─── */
    .carousel-wrap{max-width:520px;margin:0 auto 2.5rem}
    .carousel-viewport{overflow:hidden;border-radius:20px;border:1px solid var(--border);position:relative;background:#000}
    .carousel-track{display:flex;transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);width:100%}
    .carousel-slide{flex:0 0 100%;min-width:0}
    .carousel-slide video{width:100%;display:block;height:auto}
    .carousel-slide .review-video-card__label{display:block;padding:0.8rem 1rem;font-size:1.1rem;font-weight:700;color:var(--gold-light);background:var(--bg);text-align:center;border-top:1px solid var(--border);letter-spacing:0.03em}
    
    /* arrows */
    .carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,0.6);color:#fff;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.3s,opacity 0.3s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .carousel-arrow:hover{background:rgba(0,0,0,0.85)}
    .carousel-arrow:disabled{opacity:0;pointer-events:none}
    .carousel-arrow--prev{left:10px}
    .carousel-arrow--next{right:10px}
    
    /* counter + dots */
    .carousel-counter{text-align:center;margin-top:0.8rem;font-size:0.85rem;color:var(--text-muted);font-weight:500;letter-spacing:0.05em}
    .carousel-dots{display:flex;justify-content:center;gap:8px;margin-top:0.6rem}
    .carousel-dot{width:8px;height:8px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);cursor:pointer;transition:background 0.3s;padding:0}
    .carousel-dot.active{background:var(--gold-light)}
    
    @media(max-width:640px){
      .page-reviews{padding:5rem 0.75rem 1.5rem}
      .carousel-arrow{width:36px;height:36px;font-size:1rem}
    }
  </style>
</head>
<body>
  <div class="page-reviews">
    <div style="max-width:960px;margin:0 auto">
      <a href="/" class="back-link">← Back to Home</a>
      <div class="reviews-header">
        <h1>Packing Process</h1>
        <p>Watch how we pack and prepare your orders</p>
      </div>
      <div style="text-align:center;margin-bottom:2rem">
        <a href="https://wa.me/8618026937104" target="_blank" class="btn btn--whatsapp" style="display:inline-flex;max-width:340px;padding:0.7rem 1.5rem;font-size:0.85rem">📲 Contact Us on WhatsApp</a>
      </div>

      <h2 class="review-label">Our packing process:</h2>
      <div class="carousel-wrap">
        <div class="carousel-viewport">
          <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide">
              <video src="album-video.mp4" poster="album-video-1-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="review-video-card__label">Packing process step 1</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-2.mp4" poster="album-video-2-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="review-video-card__label">Packing process step 2</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-3.mp4" poster="album-video-3-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="review-video-card__label">Packing process step 3</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-5.mp4" poster="album-video-5-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="review-video-card__label">Packing process step 4</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-7.mp4" poster="album-video-7-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="review-video-card__label">Packing process step 5</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-4.mp4" poster="album-video-4-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="review-video-card__label">Packing process step 6</span>
            </div>
          </div>
          <button class="carousel-arrow carousel-arrow--prev" id="prevBtn" aria-label="Previous">◀</button>
          <button class="carousel-arrow carousel-arrow--next" id="nextBtn" aria-label="Next">▶</button>
        </div>
        <div class="carousel-counter" id="carouselCounter">1 / 6</div>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
    </div>
  </div>

  <script>
    const track = document.getElementById('carouselTrack')
    const prevBtn = document.getElementById('prevBtn')
    const nextBtn = document.getElementById('nextBtn')
    const counter = document.getElementById('carouselCounter')
    const dotsContainer = document.getElementById('carouselDots')
    const slides = track.querySelectorAll('.carousel-slide')
    const videos = track.querySelectorAll('video')
    const total = slides.length
    let current = 0
    let autoTimer = null

    for (let i = 0; i < total; i++) {
      const dot = document.createElement('button')
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '')
      dot.setAttribute('aria-label', 'Go to step ' + (i + 1))
      dot.addEventListener('click', () => goTo(i))
      dotsContainer.appendChild(dot)
    }

    function goTo(index) {
      if (index < 0) index = 0
      if (index >= total) index = total - 1
      current = index
      track.style.transform = 'translateX(-' + (current * 100) + '%)'
      counter.textContent = (current + 1) + ' / ' + total
      prevBtn.disabled = current === 0
      nextBtn.disabled = current === total - 1
      // Center short videos vertically
      slides.forEach((s, i) => {
        s.style.display = 'flex'
        s.style.flexDirection = 'column'
        s.style.justifyContent = i === current ? 'center' : 'flex-start'
        s.style.minHeight = i === current ? '100%' : ''
      })
      dotsContainer.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === current)
      })
      restartAuto()
    }

    function restartAuto() {
      if (autoTimer) clearInterval(autoTimer)
      autoTimer = setInterval(() => {
        const anyPlaying = [...videos].some(v => !v.paused)
        if (!anyPlaying) {
          goTo((current + 1) % total)
        }
      }, 4000)
    }

    prevBtn.addEventListener('click', () => goTo(current - 1))
    nextBtn.addEventListener('click', () => goTo(current + 1))
    prevBtn.addEventListener('click', restartAuto)
    nextBtn.addEventListener('click', restartAuto)

    // Touch swipe
    let startX = 0, endX = 0
    const viewport = document.querySelector('.carousel-viewport')
    viewport.addEventListener('touchstart', (e) => { startX = e.changedTouches[0].screenX }, {passive: true})
    viewport.addEventListener('touchend', (e) => {
      endX = e.changedTouches[0].screenX
      const diff = startX - endX
      if (Math.abs(diff) > 50) {
        if (diff > 0 && current < total - 1) goTo(current + 1)
        else if (diff < 0 && current > 0) goTo(current - 1)
      }
    }, {passive: true})

    goTo(0)
  </script>
</body>
</html>
