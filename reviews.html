<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packing Process — Shenzhen Luosheng Digital Technology Firm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Playfair+Display:ital,wght@0,600..900;1,600..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-reviews{min-height:100vh;padding:7rem 1.5rem 2rem;background:var(--bg)}
    .reviews-header{text-align:center;margin-bottom:2.5rem}
    .reviews-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;font-style:italic;color:var(--gold-light)}
    .reviews-header p{color:var(--text-muted);font-size:0.9rem;margin-top:0.3rem}
    .back-link{display:inline-flex;align-items:center;gap:0.4rem;color:var(--gold-light);text-decoration:none;font-size:0.9rem;font-weight:500;margin-bottom:1.5rem;transition:gap 0.3s}
    .back-link:hover{gap:0.7rem}
    .review-video-grid{display:flex;gap:1rem;margin:0 auto 2rem;max-width:960px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
    .review-video-card{flex:1 1 300px;max-width:470px;border-radius:20px;overflow:hidden;border:1px solid var(--border);background:#000}
    .review-video-card video{display:block;max-width:100%;height:auto}
    .review-video-card__label{display:block;padding:0.6rem 1rem;font-size:0.85rem;font-weight:600;color:var(--gold-light);background:var(--bg);text-align:center;border-top:1px solid var(--border)}
    .review-label{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;font-style:italic;color:var(--gold-light);margin:0 auto 1.5rem;max-width:640px;text-align:center}
    @media(max-width:640px){.page-reviews{padding:5rem 0.75rem 1.5rem}}
  </style>
</head>
<body>
  <div class="page-reviews">
    <div style="max-width:960px;margin:0 auto">
      <a href="/" class="back-link">← Back to Home</a>
      <div class="reviews-header">
        <h1>Packing Process</h1>
        <p>Watch how we pack and prepare your orders</p>
      </div>
      <div style="text-align:center;margin-bottom:2rem">
        <a href="https://wa.me/8618026937104" target="_blank" class="btn btn--whatsapp" style="display:inline-flex;max-width:340px;padding:0.7rem 1.5rem;font-size:0.85rem">📲 Contact Us on WhatsApp</a>
      </div>
      <h2 class="review-label">Our packing process:</h2>
      <div class="review-video-grid">
        <div class="review-video-card">
          <video src="album-video.mp4" poster="album-video-1-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Packing process 1-</span>
        </div>
        <div class="review-video-card">
          <video src="album-video-2.mp4" poster="album-video-2-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Packing process 2-</span>
        </div>
        <div class="review-video-card">
          <video src="album-video-3.mp4" poster="album-video-3-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Packing process 3-</span>
        </div>
        <div class="review-video-card">
          <video src="album-video-5.mp4" poster="album-video-5-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Packing process 4-</span>
        </div>
        <div class="review-video-card">
          <video src="album-video-7.mp4" poster="album-video-7-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Packing process 5-</span>
        </div>
        <div class="review-video-card">
          <video src="album-video-4.mp4" poster="album-video-4-poster.jpg" controls playsinline preload="auto"></video>
          <span class="review-video-card__label">Packing process 6-</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
